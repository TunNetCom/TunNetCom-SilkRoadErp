# ============================================================
# Deploy SilkRoad API & WebApp to Etablissement Nizar Kubernetes
# ============================================================
trigger: none
pr: none

pool:
  name: OnPremAgents
  demands:
    - Agent.Name -equals nizar-server

variables:
- group: silkroad-prod
- name: connectionString
  value: $(Connection_String_EtablissementNizar)
- name: kubeNamespace
  value: silkroad-prod-nizar
- name: deploymentApiName
  value: silkroad-api-nizar
- name: deploymentWebappName
  value: silkroad-webapp-nizar
- name: manifestPath
  value: src/deployments/etablissementNizar-deploy.yaml

stages:
- stage: Deploy
  displayName: Deploy to Etablissement Nizar Kubernetes
  jobs:
  - template: templates/deploy-k8s-job.yml
    parameters:
      stageDisplayName: Deploy to Etablissement Nizar Kubernetes
      kubeNamespace: $(kubeNamespace)
      deploymentApiName: $(deploymentApiName)
      deploymentWebappName: $(deploymentWebappName)
      manifestPath: $(manifestPath)
      forceImagePullPatch: false
