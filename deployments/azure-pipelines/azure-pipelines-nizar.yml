# ============================================================
# Deploy SilkRoad API & WebApp to On-Prem Kubernetes (Nizar)
# ============================================================
trigger: none
pr: none

pool:
  name: OnPremAgents

variables:
- group: silkroad-prod
- name: connectionString
  value: $(Connection_String_Nizar)
- name: kubeNamespace
  value: silkroad-prod-nizar
- name: deploymentApiName
  value: silkroad-api-nizar
- name: deploymentWebappName
  value: silkroad-webapp-nizar
- name: manifestPath
  value: src/deployments/prod-deployment-nizar.yaml

stages:
- stage: Deploy
  displayName: Deploy to Nizar Kubernetes
  jobs:
  - template: templates/deploy-k8s-job.yml
    parameters:
      stageDisplayName: Deploy to Nizar Kubernetes
      kubeNamespace: $(kubeNamespace)
      deploymentApiName: $(deploymentApiName)
      deploymentWebappName: $(deploymentWebappName)
      manifestPath: $(manifestPath)
      forceImagePullPatch: true
      verboseVerify: true
