# ============================================================
# Dev CI/CD Pipeline for SilkRoad (Deploys to silkroad-dev)
# WITH TRIVY REPORTS
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod
- name: connectionString
  value: $(Connection_String_Dev)
- name: solution
  value: '**/*.sln'
- name: buildConfiguration
  value: 'Release'
- name: dockerRepository
  value: 'tunnetcom/silkroad'
- name: apiTag
  value: 'api-$(Build.BuildId)'
- name: webappTag
  value: 'webapp-$(Build.BuildId)'
- name: kubeNamespace
  value: 'silkroad-dev'

stages:

# ============================================================
# 1️⃣ BUILD & PUSH STAGE
# ============================================================
- stage: BuildAndPush
  displayName: Build and Push Docker Images
  jobs:
  - job: BuildPushJob
    displayName: Build & Push
    steps:

    # -----------------------------
    # Docker Login
    # -----------------------------
    - task: Docker@2
      displayName: Login to DockerHub
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    # -----------------------------
    # .NET SDK
    # -----------------------------
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '10.x'

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: restore
        projects: '$(solution)'

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: '$(solution)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    # -----------------------------
    # Install Trivy
    # -----------------------------
    - script: |
        sudo apt-get update -qq
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y trivy
      displayName: Install Trivy

    # ============================================================
    # 🐳 API BUILD + SCAN
    # ============================================================

    - script: |
        set -e
        docker build --no-cache \
          -t $(dockerRepository):$(apiTag) \
          -f $(Build.SourcesDirectory)/src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile \
          $(Build.SourcesDirectory)
      displayName: Build API Image

    # ❌ FAIL IF HIGH/CRITICAL
    - script: |
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --no-progress \
          $(dockerRepository):$(apiTag)
      displayName: Trivy Scan API

    # 📄 JSON REPORT
    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/trivy
        trivy image \
          --format json \
          -o $(Build.ArtifactStagingDirectory)/trivy/api-report.json \
          $(dockerRepository):$(apiTag)
      displayName: Trivy JSON API
      condition: always()

    # 🌐 HTML REPORT (IMPORTANT FOR YOU)
    - script: |
        trivy image \
          --format template \
          --template "@contrib/html.tpl" \
          -o $(Build.ArtifactStagingDirectory)/trivy/api-report.html \
          $(dockerRepository):$(apiTag)
      displayName: Trivy HTML API
      condition: always()

    # 📊 SARIF REPORT (Security tools)
    - script: |
        trivy image \
          --format sarif \
          -o $(Build.ArtifactStagingDirectory)/trivy/api-report.sarif \
          $(dockerRepository):$(apiTag)
      displayName: Trivy SARIF API
      condition: always()

    # PUSH API IMAGE
    - script: |
        docker tag $(dockerRepository):$(apiTag) $(dockerRepository):latest-api
        docker push $(dockerRepository):$(apiTag)
        docker push $(dockerRepository):latest-api
      displayName: Push API Image

    # ============================================================
    # 🐳 WEBAPP
    # ============================================================

    - script: |
        set -e
        docker build --no-cache \
          -t $(dockerRepository):$(webappTag) \
          -f $(Build.SourcesDirectory)/src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile \
          $(Build.SourcesDirectory)
      displayName: Build WebApp Image

    - script: |
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(webappTag)
      displayName: Trivy Scan WebApp

    # JSON
    - script: |
        trivy image \
          --format json \
          -o $(Build.ArtifactStagingDirectory)/trivy/webapp-report.json \
          $(dockerRepository):$(webappTag)
      displayName: Trivy JSON WebApp
      condition: always()

    # HTML
    - script: |
        trivy image \
          --format template \
          --template "@contrib/html.tpl" \
          -o $(Build.ArtifactStagingDirectory)/trivy/webapp-report.html \
          $(dockerRepository):$(webappTag)
      displayName: Trivy HTML WebApp
      condition: always()

    # SARIF
    - script: |
        trivy image \
          --format sarif \
          -o $(Build.ArtifactStagingDirectory)/trivy/webapp-report.sarif \
          $(dockerRepository):$(webappTag)
      displayName: Trivy SARIF WebApp
      condition: always()

    # PUSH WEBAPP
    - script: |
        docker tag $(dockerRepository):$(webappTag) $(dockerRepository):latest-webapp
        docker push $(dockerRepository):$(webappTag)
        docker push $(dockerRepository):latest-webapp
      displayName: Push WebApp Image

    # ============================================================
    # K8S SCAN
    # ============================================================
    - script: |
        trivy config \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(Build.SourcesDirectory)/deployments/k8s/
      displayName: Trivy K8s Scan

    # ============================================================
    # ARTIFACTS (THIS IS WHAT MAKES REPORTS VISIBLE IN UI)
    # ============================================================

    - task: PublishBuildArtifacts@1
      displayName: Publish Trivy Reports
      condition: always()
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/trivy'
        artifactName: 'trivy-reports'
        publishLocation: 'Container'

    - task: PublishBuildArtifacts@1
      displayName: Publish K8s Manifests
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/deployments'
        artifactName: 'k8s-manifests'
        publishLocation: 'Container'

# ============================================================
# 2️⃣ DEPLOY STAGE (UNCHANGED TEMPLATE CALL)
# ============================================================
- stage: Deploy
  displayName: Deploy to SilkRoad Dev (silkroad-dev)
  dependsOn: BuildAndPush
  pool:
    name: OnPremAgents

  jobs:
  - template: /deployments/azure-pipelines/templates/deploy-k8s-job.yml
    parameters:
      kubeNamespace: $(kubeNamespace)
      deploymentApiName: silkroad-api
      deploymentWebappName: silkroad-webapp
      manifestPath: $(Pipeline.Workspace)/k8s-manifests/prod-deployment.yaml
      artifactName: k8s-manifests
      forceImagePullPatch: false