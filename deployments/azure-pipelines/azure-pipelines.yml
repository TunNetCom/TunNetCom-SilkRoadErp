# ============================================================
# SilkRoad CI/CD Pipeline - BLUE/GREEN + SECURITY + SONARQUBE
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod
- name: dockerRepository
  value: 'tunnetcom/silkroad'
- name: apiTag
  value: 'api-$(Build.BuildId)'
- name: webappTag
  value: 'webapp-$(Build.BuildId)'
- name: kubeNamespace
  value: 'silkroad-dev'
- name: apiService
  value: 'silkroad-api-service'
- name: webService
  value: 'silkroad-webapp-service'
- name: zapTarget
  value: 'https://silkroad.aion-time.com'

stages:

# ============================================================
# 1️⃣  BUILD
# ============================================================
- stage: Build
  displayName: Build, SonarQube, Scan & Push
  jobs:
  - job: BuildPush
    steps:

    - task: Docker@2
      displayName: Docker Login
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    - task: UseDotNet@2
      displayName: Install .NET SDK 8 (SonarQube scanner requirement)
      inputs:
        packageType: sdk
        version: '8.x'

    - task: UseDotNet@2
      displayName: Install .NET SDK 10 (active default)
      inputs:
        packageType: sdk
        version: '10.x'

    - task: DotNetCoreCLI@2
      displayName: Restore NuGet packages
      inputs:
        command: restore
        projects: '**/*.sln'

    - task: SonarQubePrepare@7
      displayName: SonarQube Prepare
      inputs:
        SonarQube: 'SonarConnection'
        scannerMode: 'dotnet'
        projectKey: 'Silk_Road_ERP_Silk_Road_ERP_5cfe75f5-a231-4074-9e4c-4f5ccd21b96e'
        projectName: 'SilkRoad ERP'
        extraProperties: |
          sonar.host.url=https://sonarqube.aion-time.com
          sonar.exclusions=**/bin/**,**/obj/**,**/*.json,**/*.html
          sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/**/coverage.opencover.xml
          sonar.cpd.exclusions=**/*.json,**/*.html

    - task: DotNetCoreCLI@2
      displayName: Build solution
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration Release --no-restore'

    - task: CmdLine@2
      displayName: Pre-pull SQL Server image for Testcontainers
      inputs:
        script: |
          docker pull mcr.microsoft.com/mssql/server:2022-latest

    - task: DotNetCoreCLI@2
      displayName: Run tests with coverage
      continueOnError: true
      inputs:
        command: test
        projects: '**/*[Tt]est*/*.csproj'
        publishTestResults: false
        arguments: >-
          --logger trx
          --results-directory $(Agent.TempDirectory)
          --configuration Release
          --collect "XPlat Code Coverage"
          --settings test.runsettings
          --logger "console;verbosity=detailed"
      env:
        TESTCONTAINERS_RYUK_DISABLED: "true"

    - task: PublishTestResults@2
      displayName: Publish test results
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '$(Agent.TempDirectory)/**/*.trx'

    - task: SonarQubeAnalyze@7
      displayName: SonarQube Analyze

    - task: SonarQubePublish@7
      displayName: SonarQube Publish Quality Gate
      inputs:
        pollingTimeoutSec: '300'

    - task: CmdLine@2
      displayName: Pre-Docker Disk Cleanup
      inputs:
        script: |
          df -h
          find . -type d -name 'bin' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'obj' -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.sonar/cache 2>/dev/null || true
          dotnet nuget locals all --clear 2>/dev/null || true
          docker system prune -af || true
          docker builder prune -af || true
          df -h

    - task: CmdLine@2
      displayName: Build API image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(apiTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile .

    - task: CmdLine@2
      displayName: Push API image
      inputs:
        script: |
          docker push $(dockerRepository):$(apiTag)

    - task: CmdLine@2
      displayName: Cleanup after API build
      inputs:
        script: |
          docker system prune -af || true
          docker builder prune -af || true
          df -h

    - task: CmdLine@2
      displayName: Build Web image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(webappTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile .

    - task: CmdLine@2
      displayName: Push Web image
      inputs:
        script: |
          docker push $(dockerRepository):$(webappTag)

    - task: CmdLine@2
      displayName: Cleanup after Web build
      inputs:
        script: |
          docker system prune -af || true
          docker builder prune -af || true
          df -h

# ============================================================
# 2️⃣  DEPLOY TO DEV
# ============================================================
- stage: Deploy
  displayName: Blue/Green Deploy to Dev
  condition: succeeded()
  pool:
    name: OnPremAgents
  jobs:
  - deployment: BlueGreenDeploy          # ← deployment job, not job
    displayName: Deploy to Dev
    environment: silkroad-dev            # ← links to the environment
    strategy:
      runOnce:
        deploy:
          steps:

          - task: CmdLine@2
            displayName: Detect Active Environment
            inputs:
              script: |
                CURRENT=$(kubectl get svc $(apiService) -n $(kubeNamespace) \
                  -o jsonpath='{.spec.selector.version}')
                echo "Current active version: $CURRENT"
                if [ "$CURRENT" = "blue" ]; then
                  echo "##vso[task.setvariable variable=targetColor]green"
                  echo "##vso[task.setvariable variable=otherColor]blue"
                else
                  echo "##vso[task.setvariable variable=targetColor]blue"
                  echo "##vso[task.setvariable variable=otherColor]green"
                fi

          - task: CmdLine@2
            displayName: Validate Image Tags
            inputs:
              script: |
                if [[ -z "$(apiTag)" || "$(apiTag)" == *"PLACEHOLDER"* ]]; then
                  echo "❌ Invalid apiTag: $(apiTag)"
                  exit 1
                fi
                if [[ -z "$(webappTag)" || "$(webappTag)" == *"PLACEHOLDER"* ]]; then
                  echo "❌ Invalid webappTag: $(webappTag)"
                  exit 1
                fi
                echo "✅ Image tags are valid"

          - task: CmdLine@2
            displayName: Deploy Target
            inputs:
              script: |
                kubectl apply -f deployments/k8s/api-service.yaml
                kubectl apply -f deployments/k8s/webapp-service.yaml
                kubectl apply -f deployments/k8s/api-$(targetColor).yaml
                kubectl apply -f deployments/k8s/webapp-$(targetColor).yaml
                kubectl set image deployment/silkroad-api-$(targetColor) \
                  api=$(dockerRepository):$(apiTag) \
                  -n $(kubeNamespace)
                kubectl set image deployment/silkroad-webapp-$(targetColor) \
                  webapp=$(dockerRepository):$(webappTag) \
                  -n $(kubeNamespace)

          - task: CmdLine@2
            displayName: Wait for Rollout
            inputs:
              script: |
                kubectl rollout status deployment/silkroad-api-$(targetColor) \
                  -n $(kubeNamespace) --timeout=180s
                kubectl rollout status deployment/silkroad-webapp-$(targetColor) \
                  -n $(kubeNamespace) --timeout=180s

          - task: CmdLine@2
            displayName: Verify Target Health
            inputs:
              script: |
                READY=$(kubectl get pods -n $(kubeNamespace) \
                  -l version=$(targetColor) \
                  --no-headers \
                  -o custom-columns='READY:.status.containerStatuses[0].ready,PHASE:.status.phase' \
                  | grep "true.*Running" | wc -l)
                if [ "$READY" -eq 0 ]; then
                  echo "❌ No healthy pods. Aborting."
                  kubectl describe pods -n $(kubeNamespace) -l version=$(targetColor)
                  exit 1
                fi
                echo "✅ $READY healthy pod(s) found"

          - task: CmdLine@2
            displayName: Switch Traffic
            inputs:
              script: |
                kubectl patch svc $(apiService) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-api\",\"environment\":\"production\",\"version\":\"$(targetColor)\"}}}"
                kubectl patch svc $(webService) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-webapp\",\"environment\":\"production\",\"version\":\"$(targetColor)\"}}}"

          - task: CmdLine@2
            displayName: Fix Dapr Annotations
            inputs:
              script: |
                kubectl patch deployment silkroad-api-$(targetColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"true\"}}}}}"
                kubectl patch deployment silkroad-webapp-$(targetColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"true\"}}}}}"
                kubectl patch deployment silkroad-api-$(otherColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"false\"}}}}}"
                kubectl patch deployment silkroad-webapp-$(otherColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"false\"}}}}}"

          - task: CmdLine@2
            displayName: Verify Traffic Switch
            inputs:
              script: |
                kubectl get svc $(apiService) -n $(kubeNamespace) -o wide
                kubectl get pods -n $(kubeNamespace) -l version=$(targetColor)