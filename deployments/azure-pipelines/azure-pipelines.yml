# ============================================================
# Dev CI/CD Pipeline for SilkRoad (FINAL - FULLY FIXED)
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod
- name: connectionString
  value: $(Connection_String_Dev)
- name: solution
  value: '**/*.sln'
- name: buildConfiguration
  value: 'Release'
- name: dockerRepository
  value: 'tunnetcom/silkroad'
- name: apiTag
  value: 'api-$(Build.BuildId)'
- name: webappTag
  value: 'webapp-$(Build.BuildId)'
- name: kubeNamespace
  value: 'silkroad-dev'

stages:

# ============================================================
# 1️⃣ BUILD + SCAN + PUSH
# ============================================================
- stage: BuildAndPush
  displayName: Build, Scan and Push
  jobs:
  - job: BuildPushJob
    steps:

    # -----------------------------
    # Docker login
    # -----------------------------
    - task: Docker@2
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    # -----------------------------
    # .NET build
    # -----------------------------
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.x'

    - task: DotNetCoreCLI@2
      inputs:
        command: restore
        projects: '$(solution)'

    - task: DotNetCoreCLI@2
      inputs:
        command: build
        projects: '$(solution)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    # -----------------------------
    # Install Trivy
    # -----------------------------
    - script: |
        sudo apt-get update -qq
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y trivy
      displayName: Install Trivy

    # ============================================================
    # 🐳 API BUILD
    # ============================================================
    - script: |
        docker build -t $(dockerRepository):$(apiTag) \
          -f $(Build.SourcesDirectory)/src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile \
          $(Build.SourcesDirectory)

        docker images | grep silkroad || true
      displayName: Build API

    # -----------------------------
    # TRIVY SCAN API
    # -----------------------------
    - script: |
        export TMPDIR=$(Build.SourcesDirectory)/tmp
        mkdir -p $TMPDIR

        trivy image \
          --scanners vuln \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(apiTag)
      displayName: Trivy Scan API

    # -----------------------------
    # TRIVY REPORT API (JSON + HTML)
    # -----------------------------
    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/trivy
        mkdir -p $(Build.ArtifactStagingDirectory)/security-report
        export TMPDIR=$(Build.SourcesDirectory)/tmp

        # JSON (kept for artifact)
        trivy image \
          --scanners vuln \
          --format json \
          -o $(Build.ArtifactStagingDirectory)/trivy/api.json \
          $(dockerRepository):$(apiTag)

        # HTML (for pipeline tab)
        trivy image \
          --scanners vuln \
          --format template \
          --template "@/usr/local/share/trivy/templates/html.tpl" \
          -o $(Build.ArtifactStagingDirectory)/security-report/api.html \
          $(dockerRepository):$(apiTag)
      displayName: Trivy Report API
      condition: always()

    # -----------------------------
    # PUSH API
    # -----------------------------
    - script: |
        docker tag $(dockerRepository):$(apiTag) $(dockerRepository):latest-api
        docker push $(dockerRepository):$(apiTag)
        docker push $(dockerRepository):latest-api
      displayName: Push API

    # ============================================================
    # 🧹 CLEAN BEFORE WEBAPP (CRITICAL)
    # ============================================================
    - script: |
        echo "🧹 Cleaning disk before WebApp..."

        docker system prune -af || true
        docker builder prune -af || true

        sudo rm -rf /tmp/* || true

        mkdir -p $(Build.SourcesDirectory)/tmp

        echo "📦 Disk usage:"
        df -h
      displayName: Cleanup Disk

    # ============================================================
    # 🐳 WEBAPP BUILD
    # ============================================================
    - script: |
        docker build -t $(dockerRepository):$(webappTag) \
          -f $(Build.SourcesDirectory)/src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile \
          $(Build.SourcesDirectory)

        docker images | grep silkroad || true
      displayName: Build WebApp

    # -----------------------------
    # TRIVY SCAN WEBAPP
    # -----------------------------
    - script: |
        export TMPDIR=$(Build.SourcesDirectory)/tmp

        trivy image \
          --scanners vuln \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(webappTag)
      displayName: Trivy Scan WebApp

    # -----------------------------
    # TRIVY REPORT WEBAPP (JSON + HTML)
    # -----------------------------
    - script: |
        export TMPDIR=$(Build.SourcesDirectory)/tmp

        # JSON (kept for artifact)
        trivy image \
          --scanners vuln \
          --format json \
          -o $(Build.ArtifactStagingDirectory)/trivy/web.json \
          $(dockerRepository):$(webappTag)

        # HTML (for pipeline tab)
        trivy image \
          --scanners vuln \
          --format template \
          --template "@/usr/local/share/trivy/templates/html.tpl" \
          -o $(Build.ArtifactStagingDirectory)/security-report/web.html \
          $(dockerRepository):$(webappTag)
      displayName: Trivy Report WebApp
      condition: always()

    # -----------------------------
    # PUSH WEBAPP
    # -----------------------------
    - script: |
        docker tag $(dockerRepository):$(webappTag) $(dockerRepository):latest-webapp
        docker push $(dockerRepository):$(webappTag)
        docker push $(dockerRepository):latest-webapp
      displayName: Push WebApp

    # ============================================================
    # 🔐 K8S SCAN
    # ============================================================
    - script: |
        trivy config \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(Build.SourcesDirectory)/deployments/k8s/
      displayName: Trivy K8s Scan

    # ============================================================
    # 📦 PREPARE K8S MANIFESTS
    # ============================================================
    - script: |
        echo "📦 Preparing Kubernetes manifests..."

        mkdir -p $(Build.ArtifactStagingDirectory)/deployments

        cp -v $(Build.SourcesDirectory)/deployments/k8s/*.yaml \
          $(Build.ArtifactStagingDirectory)/deployments/

        echo "✅ K8s manifests ready"
      displayName: Prepare K8s Manifests

    # -----------------------------
    # Publish K8s manifests
    # -----------------------------
    - task: PublishBuildArtifacts@1
      displayName: Publish K8s Manifests
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/deployments'
        artifactName: 'k8s-manifests'

    # -----------------------------
    # Publish Trivy JSON reports
    # -----------------------------
    - task: PublishBuildArtifacts@1
      displayName: Publish Trivy JSON Reports
      condition: always()
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/trivy'
        artifactName: 'trivy-reports'

    # -----------------------------
    # Publish HTML Security Report
    # -----------------------------
    - task: PublishBuildArtifacts@1
      displayName: Publish HTML Security Report
      condition: always()
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/security-report'
        artifactName: 'security-report'

    # -----------------------------
    # Show Security Report Tab
    # -----------------------------
    - task: PublishHtmlReport@1
      displayName: Show Security Report Tab
      condition: always()
      inputs:
        reportDir: '$(Build.ArtifactStagingDirectory)/security-report'
        tabName: 'Security Report'

# ============================================================
# 2️⃣ DEPLOY 
# ============================================================
- stage: Deploy
  displayName: Deploy to SilkRoad Dev
  dependsOn: BuildAndPush
  pool:
    name: OnPremAgents

  jobs:
  - template: /deployments/azure-pipelines/templates/deploy-k8s-job.yml
    parameters:
      kubeNamespace: $(kubeNamespace)
      deploymentApiName: silkroad-api
      deploymentWebappName: silkroad-webapp
      manifestPath: $(Pipeline.Workspace)/k8s-manifests/prod-deployment.yaml
      artifactName: k8s-manifests
      forceImagePullPatch: false