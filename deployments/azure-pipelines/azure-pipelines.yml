# ============================================================
# SilkRoad CI/CD Pipeline - BLUE/GREEN + SECURITY + SONARQUBE
# ============================================================

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod

- name: dockerRepository
  value: 'tunnetcom/silkroad'

- name: apiTag
  value: 'api-$(Build.BuildId)'

- name: webappTag
  value: 'webapp-$(Build.BuildId)'

- name: kubeNamespace
  value: 'silkroad-dev'

- name: apiService
  value: 'silkroad-api-service'

- name: webService
  value: 'silkroad-webapp-service'

- name: zapTarget
  value: 'https://silkroad.aion-time.com'

# ============================================================
# 1️⃣ BUILD + SONARQUBE + TRIVY + PUSH
# ============================================================

stages:

- stage: Build
  displayName: Build, SonarQube, Scan & Push

  jobs:
  - job: BuildPush

    steps:

    # ========================================================
    # Docker Login
    # ========================================================

    - task: Docker@2
      displayName: Docker Login
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    # ========================================================
    # Install .NET SDKs
    # ========================================================

    - task: UseDotNet@2
      displayName: Install .NET 10 SDK
      inputs:
        packageType: sdk
        version: '10.x'

    - task: UseDotNet@2
      displayName: Install .NET 8 SDK
      inputs:
        packageType: sdk
        version: '8.x'

    # ========================================================
    # Restore
    # ========================================================

    - task: DotNetCoreCLI@2
      displayName: Restore Solution
      inputs:
        command: restore
        projects: '**/*.sln'

    # ========================================================
    # SONARQUBE PREPARE
    # IMPORTANT:
    # - Force C# only
    # - Disable JS/TS bridge
    # - Prevent Node dependency
    # ========================================================

# ============================================================
# SONARQUBE PREPARE
# ============================================================

    - task: SonarQubePrepare@7
      displayName: Prepare SonarQube Analysis
      inputs:
        SonarQube: 'SonarConnection'
        scannerMode: 'dotnet'
        projectKey: 'Silk_Road_ERP_Silk_Road_ERP_f493c9cb-0b66-4d3f-8bfe-e8056216b526'
        projectName: 'SilkRoad ERP'
        extraProperties: |
          sonar.host.url=https://sonarqube.aion-time.com

          # ======================================================
          # C# ONLY
          # ======================================================
          sonar.inclusions=**/*.cs,**/*.csproj

          # ======================================================
          # EXCLUSIONS
          # ======================================================
          sonar.exclusions=**/bin/**,**/obj/**,**/wwwroot/**,**/node_modules/**,**/*.js,**/*.ts,**/*.html,**/*.css,**/*.json

          sonar.cpd.exclusions=**/*.js,**/*.ts,**/*.html,**/*.json

          sonar.coverage.exclusions=**/*

          # ======================================================
          # DISABLE JS / TS
          # ======================================================
          sonar.javascript.file.suffixes=
          sonar.typescript.file.suffixes=

          # ======================================================
          # STABILITY
          # ======================================================
          sonar.ws.timeout=300
          sonar.scanner.skipJreProvisioning=true
    # ========================================================
    # BUILD
    # ========================================================

    - task: DotNetCoreCLI@2
      displayName: Build Solution
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration Release --no-restore'

    # ========================================================
    # SONARQUBE ANALYZE
    # ========================================================

    - task: SonarQubeAnalyze@7
      displayName: Run SonarQube Analysis

    # ========================================================
    # SONARQUBE QUALITY GATE
    # ========================================================

    - task: SonarQubePublish@7
      displayName: Publish SonarQube Quality Gate
      inputs:
        pollingTimeoutSec: '300'

    # ========================================================
    # DISK CLEANUP
    # ========================================================

    - task: CmdLine@2
      displayName: Cleanup Before Docker
      inputs:
        script: |
          echo "Cleaning workspace..."

          find . -type d -name 'bin' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'obj' -exec rm -rf {} + 2>/dev/null || true

          rm -rf ~/.sonar/cache 2>/dev/null || true

          dotnet nuget locals all --clear 2>/dev/null || true

          docker system prune -af || true
          docker builder prune -af || true

          df -h

    # ========================================================
    # INSTALL TRIVY
    # ========================================================

    - task: CmdLine@2
      displayName: Install Trivy
      inputs:
        script: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update -qq
          sudo apt-get install -y trivy

    # ========================================================
    # BUILD API IMAGE
    # ========================================================

    - task: CmdLine@2
      displayName: Build API Image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(apiTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile .

    # ========================================================
    # SCAN API IMAGE
    # ========================================================

    - task: CmdLine@2
      displayName: Scan API Image
      inputs:
        script: |
          export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-api
          mkdir -p $TRIVY_CACHE_DIR

          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            $(dockerRepository):$(apiTag)

    # ========================================================
    # PUSH API IMAGE
    # ========================================================

    - task: CmdLine@2
      displayName: Push API Image
      inputs:
        script: |
          docker push $(dockerRepository):$(apiTag)

    # ========================================================
    # CLEAN API BUILD
    # ========================================================

    - task: CmdLine@2
      displayName: Cleanup API Build
      inputs:
        script: |
          docker system prune -af || true
          docker builder prune -af || true

    # ========================================================
    # BUILD WEB IMAGE
    # ========================================================

    - task: CmdLine@2
      displayName: Build Web Image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(webappTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile .

    # ========================================================
    # SCAN WEB IMAGE
    # ========================================================

    - task: CmdLine@2
      displayName: Scan Web Image
      inputs:
        script: |
          export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-web
          mkdir -p $TRIVY_CACHE_DIR

          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            $(dockerRepository):$(webappTag)

    # ========================================================
    # PUSH WEB IMAGE
    # ========================================================

    - task: CmdLine@2
      displayName: Push Web Image
      inputs:
        script: |
          docker push $(dockerRepository):$(webappTag)

    # ========================================================
    # CLEAN WEB BUILD
    # ========================================================

    - task: CmdLine@2
      displayName: Cleanup Web Build
      inputs:
        script: |
          docker system prune -af || true
          docker builder prune -af || true

# ============================================================
# 2️⃣ ZAP BASELINE
# ============================================================

- stage: ZAP_Baseline
  displayName: DAST - ZAP Baseline Scan

  dependsOn:
  - Build

  condition: succeeded()

  jobs:
  - job: ZAPBaselineJob

    pool:
      vmImage: 'ubuntu-latest'

    steps:

    - task: CmdLine@2
      displayName: Prepare ZAP Directory
      inputs:
        script: |
          mkdir -p $(System.DefaultWorkingDirectory)/zap-baseline
          chmod 777 $(System.DefaultWorkingDirectory)/zap-baseline

    - task: CmdLine@2
      displayName: Pull ZAP Image
      inputs:
        script: |
          docker pull ghcr.io/zaproxy/zaproxy:stable

    - task: CmdLine@2
      displayName: Run ZAP Baseline Scan
      inputs:
        script: |
          docker run --rm \
            -v $(System.DefaultWorkingDirectory)/zap-baseline:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t $(zapTarget) \
            -r zap-baseline.html \
            -J zap-baseline.json \
            -l WARN \
            -I

    - task: PublishBuildArtifacts@1
      displayName: Publish ZAP Baseline Report
      condition: always()
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/zap-baseline'
        artifactName: 'ZAP-Baseline-Report'

# ============================================================
# 3️⃣ BLUE/GREEN DEPLOYMENT
# ============================================================

- stage: Deploy
  displayName: Blue/Green Deploy

  dependsOn:
  - ZAP_Baseline

  condition: succeeded()

  jobs:
  - job: BlueGreenDeploy

    pool:
      name: OnPremAgents

    steps:

    - task: CmdLine@2
      displayName: Detect Active Environment
      inputs:
        script: |
          CURRENT=$(kubectl get svc $(apiService) -n $(kubeNamespace) \
            -o jsonpath='{.spec.selector.version}')

          echo "Current version: $CURRENT"

          if [ "$CURRENT" = "blue" ]; then
            echo "##vso[task.setvariable variable=targetColor]green"
          else
            echo "##vso[task.setvariable variable=targetColor]blue"
          fi

    - task: CmdLine@2
      displayName: Deploy Target Environment
      inputs:
        script: |
          kubectl apply -f deployments/k8s/api-service.yaml
          kubectl apply -f deployments/k8s/webapp-service.yaml

          kubectl apply -f deployments/k8s/api-$(targetColor).yaml
          kubectl apply -f deployments/k8s/webapp-$(targetColor).yaml

          kubectl set image deployment/silkroad-api-$(targetColor) \
            api=$(dockerRepository):$(apiTag) \
            -n $(kubeNamespace)

          kubectl set image deployment/silkroad-webapp-$(targetColor) \
            webapp=$(dockerRepository):$(webappTag) \
            -n $(kubeNamespace)

    - task: CmdLine@2
      displayName: Wait For Rollout
      inputs:
        script: |
          kubectl rollout status deployment/silkroad-api-$(targetColor) \
            -n $(kubeNamespace) --timeout=180s

          kubectl rollout status deployment/silkroad-webapp-$(targetColor) \
            -n $(kubeNamespace) --timeout=180s

    - task: CmdLine@2
      displayName: Verify Health
      inputs:
        script: |
          kubectl get pods -n $(kubeNamespace) -l version=$(targetColor)

    - task: CmdLine@2
      displayName: Switch Traffic
      inputs:
        script: |
          kubectl patch svc $(apiService) -n $(kubeNamespace) \
            -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-api\",\"environment\":\"production\",\"version\":\"$(targetColor)\"}}}"

          kubectl patch svc $(webService) -n $(kubeNamespace) \
            -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-webapp\",\"environment\":\"production\",\"version\":\"$(targetColor)\"}}}"

    - task: CmdLine@2
      displayName: Final Verification
      inputs:
        script: |
          kubectl get svc $(apiService) -n $(kubeNamespace)
          kubectl get svc $(webService) -n $(kubeNamespace)

          kubectl get pods -n $(kubeNamespace) -l version=$(targetColor)