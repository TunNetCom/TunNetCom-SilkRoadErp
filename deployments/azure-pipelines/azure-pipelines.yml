# ============================================================
# SilkRoad CI/CD Pipeline - BLUE/GREEN + SECURITY + SONARQUBE
# ============================================================
# Stages: Build (+Trivy) -> ZAP Baseline -> ZAP AJAX -> Deploy
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod
- name: dockerRepository
  value: 'tunnetcom/silkroad'
- name: apiTag
  value: 'api-$(Build.BuildId)'
- name: webappTag
  value: 'webapp-$(Build.BuildId)'
- name: kubeNamespace
  value: 'silkroad-dev'
- name: apiService
  value: 'silkroad-api-service'
- name: webService
  value: 'silkroad-webapp-service'
- name: zapTarget
  value: 'https://silkroad.aion-time.com'
- name: defectDojoUrl
  value: 'https://defectdojo.aion-time.com'

stages:

# ============================================================
# 1️⃣  BUILD
# ============================================================
- stage: Build
  displayName: Build, SonarQube, Scan & Push
  jobs:
  - job: BuildPush
    timeoutInMinutes: 300
    cancelTimeoutInMinutes: 5
    steps:

    - task: Docker@2
      displayName: Docker Login
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    - task: UseDotNet@2
      displayName: Install .NET SDK 8 (SonarQube scanner requirement)
      inputs:
        packageType: sdk
        version: '8.x'

    - task: UseDotNet@2
      displayName: Install .NET SDK 10 (active default)
      inputs:
        packageType: sdk
        version: '10.x'

    - task: DotNetCoreCLI@2
      displayName: Restore NuGet packages
      inputs:
        command: restore
        projects: '**/*.sln'

    # ============================================================
    # 🛡️ OWASP DEPENDENCY-CHECK (SCA - scans NuGet dependencies
    # against the NVD database, independent of Trivy's image scan)
    # ============================================================
    - task: CmdLine@2
      displayName: Prepare OWASP Dependency-Check directories
      inputs:
        script: |
          mkdir -p $(System.DefaultWorkingDirectory)/dependency-check-report
          mkdir -p $(Pipeline.Workspace)/dependency-check-data
          mkdir -p /tmp/dependency-check-data
          chmod 777 $(System.DefaultWorkingDirectory)/dependency-check-report
          chmod 777 $(Pipeline.Workspace)/dependency-check-data
          chmod 777 /tmp/dependency-check-data
          # ---- Copy the cache-restored data onto guaranteed-local disk (/tmp).
          # Pipeline.Workspace's backing filesystem on hosted agents may not
          # fully support the NIO file-locking semantics Java/H2 expects,
          # which would explain a lock timeout that survives a full purge.
          # All update/scan containers below now mount /tmp instead.
          if [ -n "$(ls -A $(Pipeline.Workspace)/dependency-check-data 2>/dev/null)" ]; then
            cp -a $(Pipeline.Workspace)/dependency-check-data/. /tmp/dependency-check-data/
          fi

    # Persist the NVD vulnerability database across pipeline runs so most
    # builds only need an incremental update instead of a full cold pull.
    # Cache key rotates weekly so the DB still refreshes regularly.
    # ---- FIX: static cache key (was rotating weekly, which forced a full
    # 360k-record re-download every week and tripped NVD's 503 throttling).
    # ODC's own --nvdValidForHours check now governs freshness instead.
    # ---- FIX v2: BuildId-keyed cache (always a "miss") so a clean DB gets
    # saved fresh at the end of every successful run. The static key from the
    # previous fix could restore a corrupted/locked DB forever, since Cache@2
    # only saves on a miss — a static key that always hits never re-saves,
    # so any corruption becomes permanent. restoreKeys still lets us pull the
    # most recent good copy to keep updates incremental.
    - task: Cache@2
      displayName: Cache OWASP Dependency-Check NVD data
      inputs:
        key: 'dependency-check-nvd-v2 | "$(Build.BuildId)"'
        restoreKeys: |
          dependency-check-nvd-v2
        path: $(Pipeline.Workspace)/dependency-check-data

    - task: CmdLine@2
      displayName: Clear stale Dependency-Check lock files
      inputs:
        script: |
          find /tmp/dependency-check-data -name "*.lock.db" -delete 2>/dev/null || true

    - task: CmdLine@2
      displayName: Update NVD database
      continueOnError: true
      condition: always()
      timeoutInMinutes: 300
      inputs:
        script: |
          DATA_DIR=/tmp/dependency-check-data
          LOG_FILE="$DATA_DIR/odc-update.log"

          update_nvd() {
            docker run --rm \
              -v "$DATA_DIR":/usr/share/dependency-check/data:rw \
              owasp/dependency-check:latest \
              --updateonly \
              --nvdApiKey "$NVD_API_KEY" \
              --nvdValidForHours 24 \
              --nvdApiDelay 4000 \
              --log /usr/share/dependency-check/data/odc-update.log
          }

          echo "Attempting NVD update..."
          if update_nvd; then
            echo "NVD update succeeded."
          else
            echo "##[warning]NVD update failed. Dumping verbose log to find the real cause (the lock error is often a misleading downstream symptom, not the actual root cause):"
            echo "---------------------------------------------------------------"
            cat "$LOG_FILE" 2>/dev/null || echo "(no log file found)"
            echo "---------------------------------------------------------------"
            echo "##[warning]Purging local NVD data and retrying with a clean rebuild..."
            sudo find "$DATA_DIR" -mindepth 1 -delete
            if update_nvd; then
              echo "NVD update succeeded after clean rebuild."
            else
              echo "##[error]NVD update failed on both attempts. Verbose log from retry:"
              echo "---------------------------------------------------------------"
              cat "$LOG_FILE" 2>/dev/null || echo "(no log file found)"
              echo "---------------------------------------------------------------"
              exit 1
            fi
          fi
      env:
        NVD_API_KEY: $(nvdApiKey)

    # ---- Warn (don't fail the build) if the NVD DB looks suspiciously small,
    # which would mean the update above failed/skipped and results may be stale.
    - task: CmdLine@2
      displayName: Sanity-check NVD DB size
      condition: always()
      inputs:
        script: |
          DB_FILE=$(find /tmp/dependency-check-data -name "odc.mv.db" 2>/dev/null | head -n1)
          if [ -z "$DB_FILE" ]; then
            echo "##vso[task.logissue type=warning]NVD database file not found — scan will likely run against an empty DB."
          else
            SIZE_MB=$(du -m "$DB_FILE" | cut -f1)
            echo "NVD DB size: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 50 ]; then
              echo "##vso[task.logissue type=warning]NVD database is only ${SIZE_MB}MB — looks stale/incomplete. Scan results may under-report vulnerabilities."
            fi
          fi

    - task: CmdLine@2
      displayName: Sync updated NVD data back for caching
      condition: always()
      inputs:
        script: |
          rm -rf $(Pipeline.Workspace)/dependency-check-data/*
          cp -a /tmp/dependency-check-data/. $(Pipeline.Workspace)/dependency-check-data/

    - task: CmdLine@2
      displayName: Run OWASP Dependency-Check
      condition: always()
      inputs:
        script: |
          docker run --rm \
            -v $(System.DefaultWorkingDirectory):/src:ro \
            -v $(System.DefaultWorkingDirectory)/dependency-check-report:/report:rw \
            -v /tmp/dependency-check-data:/usr/share/dependency-check/data:rw \
            owasp/dependency-check:latest \
            --scan /src \
            --project "SilkRoad ERP" \
            --format HTML \
            --format JSON \
            --format XML \
            --out /report \
            --noupdate \
            --failOnCVSS 11

    # ---- FIX: container runs as root, so files land as root-owned with
    # restrictive perms. Reclaim ownership before publish/upload steps read them.
    - task: CmdLine@2
      displayName: Fix OWASP Dependency-Check report permissions
      condition: always()
      inputs:
        script: |
          sudo chown -R $(id -u):$(id -g) $(System.DefaultWorkingDirectory)/dependency-check-report
          sudo chmod -R 755 $(System.DefaultWorkingDirectory)/dependency-check-report

    - task: PublishBuildArtifacts@1
      displayName: Publish OWASP Dependency-Check Report
      condition: always()
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/dependency-check-report'
        artifactName: 'OWASP-DependencyCheck-Report'

    - task: PublishHtmlReport@1
      displayName: Show OWASP Dependency-Check Tab
      condition: always()
      inputs:
        reportDir: '$(System.DefaultWorkingDirectory)/dependency-check-report'
        tabName: 'OWASP Dependency-Check'

    - task: CmdLine@2
      displayName: Push OWASP Dependency-Check results to DefectDojo
      condition: always()
      inputs:
        script: |
          HTTP_CODE=$(curl -sS -o /tmp/dd_owasp_response.json -w "%{http_code}" -X POST "$DEFECTDOJO_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DEFECTDOJO_API_KEY" \
            -F "scan_type=Dependency Check Scan" \
            -F "file=@$(System.DefaultWorkingDirectory)/dependency-check-report/dependency-check-report.xml" \
            -F "product_type_name=SilkRoad ERP" \
            -F "product_name=SilkRoad ERP" \
            -F "engagement_name=SilkRoad Dependencies" \
            -F "test_title=OWASP Dependency-Check" \
            -F "auto_create_context=True" \
            -F "close_old_findings=true" \
            -F "minimum_severity=High")
          echo "DefectDojo response (HTTP $HTTP_CODE):"
          cat /tmp/dd_owasp_response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "##vso[task.logissue type=error]DefectDojo import (OWASP Dependency-Check) failed with HTTP $HTTP_CODE"
            exit 1
          fi
      env:
        DEFECTDOJO_URL: $(defectDojoUrl)
        DEFECTDOJO_API_KEY: $(defectDojoApiKey)

    - task: SonarQubePrepare@7
      displayName: SonarQube Prepare
      inputs:
        SonarQube: 'SonarConnection'
        scannerMode: 'dotnet'
        projectKey: 'Silk_Road_ERP_Silk_Road_ERP_5cfe75f5-a231-4074-9e4c-4f5ccd21b96e'
        projectName: 'SilkRoad ERP'
        extraProperties: |
          sonar.host.url=https://sonarqube.aion-time.com
          sonar.exclusions=**/bin/**,**/obj/**,**/*.json,**/*.html
          sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/**/coverage.opencover.xml
          sonar.cpd.exclusions=**/*.json,**/*.html

    - task: DotNetCoreCLI@2
      displayName: Build solution
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration Release --no-restore'

    - task: CmdLine@2
      displayName: Pre-pull SQL Server image for Testcontainers
      inputs:
        script: |
          docker pull mcr.microsoft.com/mssql/server:2022-latest

    - task: DotNetCoreCLI@2
      displayName: Run tests with coverage
      continueOnError: true
      inputs:
        command: test
        projects: '**/*[Tt]est*/*.csproj'
        publishTestResults: false
        arguments: >-
          --logger trx
          --results-directory $(Agent.TempDirectory)
          --configuration Release
          --collect "XPlat Code Coverage"
          --settings test.runsettings
          --logger "console;verbosity=detailed"
      env:
        TESTCONTAINERS_RYUK_DISABLED: "true"

    - task: PublishTestResults@2
      displayName: Publish test results
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '$(Agent.TempDirectory)/**/*.trx'

    - task: SonarQubeAnalyze@7
      displayName: SonarQube Analyze

    - task: SonarQubePublish@7
      displayName: SonarQube Publish Quality Gate
      inputs:
        pollingTimeoutSec: '300'

    - task: CmdLine@2
      displayName: Pre-Docker Disk Cleanup
      inputs:
        script: |
          df -h
          find . -type d -name 'bin' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'obj' -exec rm -rf {} + 2>/dev/null || true
          rm -rf ~/.sonar/cache 2>/dev/null || true
          dotnet nuget locals all --clear 2>/dev/null || true
          docker system prune -af || true
          docker builder prune -af || true
          df -h

    # ============================================================
    # 🔒 INSTALL TRIVY (re-added)
    # ============================================================
    # ---- FIX: apt-key is deprecated/unreliable on newer Ubuntu images
    # (ubuntu-latest has moved to 24.04 "Noble"), which was silently leaving
    # Trivy uninstalled. Use Aqua's official install script instead, and
    # verify the binary actually works before moving on so a broken install
    # fails loudly here instead of surfacing later as "command not found".
    - task: CmdLine@2
      displayName: Install Trivy
      inputs:
        script: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates curl gnupg
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          if ! command -v trivy >/dev/null 2>&1; then
            echo "##vso[task.logissue type=error]Trivy binary not found on PATH after install."
            exit 1
          fi
          trivy --version

    # ============================================================
    # 🔵 API: BUILD → SCAN (Trivy) → PUSH → CLEANUP
    # ============================================================
    - task: CmdLine@2
      displayName: Build API image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(apiTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile .

    - task: CmdLine@2
      displayName: Prepare Trivy API report directory
      inputs:
        script: |
          mkdir -p $(System.DefaultWorkingDirectory)/trivy-api-report
          chmod 777 $(System.DefaultWorkingDirectory)/trivy-api-report

    - task: CmdLine@2
      displayName: Download Trivy HTML template
      inputs:
        script: |
          mkdir -p $(Pipeline.Workspace)/trivy-templates
          curl -sL -o $(Pipeline.Workspace)/trivy-templates/html.tpl \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

    - task: CmdLine@2
      displayName: Scan API image (Trivy)
      condition: always()
      inputs:
        script: |
          export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-api
          mkdir -p $TRIVY_CACHE_DIR

          echo "Scanning API image (console)..."
          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            $(dockerRepository):$(apiTag)

          echo "Generating Trivy API HTML report..."
          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format template \
            --template "@$(Pipeline.Workspace)/trivy-templates/html.tpl" \
            -o $(System.DefaultWorkingDirectory)/trivy-api-report/trivy-api.html \
            $(dockerRepository):$(apiTag)

          echo "Generating Trivy API JSON report (for DefectDojo)..."
          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format json \
            -o $(System.DefaultWorkingDirectory)/trivy-api-report/trivy-api.json \
            $(dockerRepository):$(apiTag)

    - task: PublishBuildArtifacts@1
      displayName: Publish Trivy API Report
      condition: always()
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/trivy-api-report'
        artifactName: 'Trivy-API-Report'

    - task: PublishHtmlReport@1
      displayName: Show Trivy API Tab
      condition: always()
      inputs:
        reportDir: '$(System.DefaultWorkingDirectory)/trivy-api-report'
        tabName: 'Trivy API'

    - task: CmdLine@2
      displayName: Push Trivy API results to DefectDojo
      condition: always()
      inputs:
        script: |
          HTTP_CODE=$(curl -sS -o /tmp/dd_trivy_api_response.json -w "%{http_code}" -X POST "$DEFECTDOJO_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DEFECTDOJO_API_KEY" \
            -F "scan_type=Trivy Scan" \
            -F "file=@$(System.DefaultWorkingDirectory)/trivy-api-report/trivy-api.json" \
            -F "product_type_name=SilkRoad ERP" \
            -F "product_name=SilkRoad ERP" \
            -F "engagement_name=SilkRoad API" \
            -F "test_title=Trivy - API Image" \
            -F "auto_create_context=True" \
            -F "close_old_findings=true" \
            -F "minimum_severity=High")
          echo "DefectDojo response (HTTP $HTTP_CODE):"
          cat /tmp/dd_trivy_api_response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "##vso[task.logissue type=error]DefectDojo import (Trivy API) failed with HTTP $HTTP_CODE"
            exit 1
          fi
      env:
        DEFECTDOJO_URL: $(defectDojoUrl)
        DEFECTDOJO_API_KEY: $(defectDojoApiKey)

    - task: CmdLine@2
      displayName: Push API image
      inputs:
        script: |
          docker push $(dockerRepository):$(apiTag)

    - task: CmdLine@2
      displayName: Cleanup after API build
      inputs:
        script: |
          docker system prune -af || true
          docker builder prune -af || true
          df -h

    # ============================================================
    # 🟢 WEB: BUILD → SCAN (Trivy) → PUSH → CLEANUP
    # ============================================================
    - task: CmdLine@2
      displayName: Build Web image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(webappTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile .

    - task: CmdLine@2
      displayName: Prepare Trivy Web report directory
      inputs:
        script: |
          mkdir -p $(System.DefaultWorkingDirectory)/trivy-web-report
          chmod 777 $(System.DefaultWorkingDirectory)/trivy-web-report

    - task: CmdLine@2
      displayName: Scan Web image (Trivy)
      condition: always()
      inputs:
        script: |
          export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-web
          mkdir -p $TRIVY_CACHE_DIR

          echo "Scanning Web image (console)..."
          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            $(dockerRepository):$(webappTag)

          echo "Generating Trivy Web HTML report..."
          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format template \
            --template "@$(Pipeline.Workspace)/trivy-templates/html.tpl" \
            -o $(System.DefaultWorkingDirectory)/trivy-web-report/trivy-web.html \
            $(dockerRepository):$(webappTag)

          echo "Generating Trivy Web JSON report (for DefectDojo)..."
          trivy image \
            --scanners vuln \
            --cache-dir $TRIVY_CACHE_DIR \
            --no-progress \
            --timeout 10m \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format json \
            -o $(System.DefaultWorkingDirectory)/trivy-web-report/trivy-web.json \
            $(dockerRepository):$(webappTag)

    - task: PublishBuildArtifacts@1
      displayName: Publish Trivy Web Report
      condition: always()
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/trivy-web-report'
        artifactName: 'Trivy-Web-Report'

    - task: PublishHtmlReport@1
      displayName: Show Trivy Web Tab
      condition: always()
      inputs:
        reportDir: '$(System.DefaultWorkingDirectory)/trivy-web-report'
        tabName: 'Trivy Web'

    - task: CmdLine@2
      displayName: Push Trivy Web results to DefectDojo
      condition: always()
      inputs:
        script: |
          HTTP_CODE=$(curl -sS -o /tmp/dd_trivy_web_response.json -w "%{http_code}" -X POST "$DEFECTDOJO_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DEFECTDOJO_API_KEY" \
            -F "scan_type=Trivy Scan" \
            -F "file=@$(System.DefaultWorkingDirectory)/trivy-web-report/trivy-web.json" \
            -F "product_type_name=SilkRoad ERP" \
            -F "product_name=SilkRoad ERP" \
            -F "engagement_name=SilkRoad WebApp" \
            -F "test_title=Trivy - Web Image" \
            -F "auto_create_context=True" \
            -F "close_old_findings=true" \
            -F "minimum_severity=High")
          echo "DefectDojo response (HTTP $HTTP_CODE):"
          cat /tmp/dd_trivy_web_response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "##vso[task.logissue type=error]DefectDojo import (Trivy Web) failed with HTTP $HTTP_CODE"
            exit 1
          fi
      env:
        DEFECTDOJO_URL: $(defectDojoUrl)
        DEFECTDOJO_API_KEY: $(defectDojoApiKey)

    - task: CmdLine@2
      displayName: Push Web image
      inputs:
        script: |
          docker push $(dockerRepository):$(webappTag)

    - task: CmdLine@2
      displayName: Cleanup after Web build
      inputs:
        script: |
          docker system prune -af || true
          docker builder prune -af || true
          df -h


# ============================================================
# 2️⃣  ZAP BASELINE (re-added)
# ============================================================
- stage: ZAP_Baseline
  displayName: DAST - ZAP Baseline Scan
  dependsOn:
  - Build
  condition: succeeded()
  pool:
    vmImage: 'ubuntu-latest'
  jobs:
  - job: ZAPBaselineJob
    displayName: ZAP Baseline (passive scan)
    steps:

    - task: CmdLine@2
      displayName: Prepare ZAP Baseline directory
      inputs:
        script: |
          mkdir -p $(System.DefaultWorkingDirectory)/zap-baseline
          chmod 777 $(System.DefaultWorkingDirectory)/zap-baseline

    - task: CmdLine@2
      displayName: Pull ZAP image
      inputs:
        script: |
          docker pull ghcr.io/zaproxy/zaproxy:stable

    - task: CmdLine@2
      displayName: Run ZAP Baseline scan
      inputs:
        script: |
          docker run --rm \
            -v $(System.DefaultWorkingDirectory)/zap-baseline:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t $(zapTarget) \
            -r zap-baseline.html \
            -J zap-baseline.json \
            -x zap-baseline.xml \
            -l WARN \
            -I

    - task: CmdLine@2
      displayName: Fix ZAP report permissions
      condition: always()
      inputs:
        script: |
          sudo chown -R $(id -u):$(id -g) $(System.DefaultWorkingDirectory)/zap-baseline
          sudo chmod -R 755 $(System.DefaultWorkingDirectory)/zap-baseline

    - task: PublishBuildArtifacts@1
      displayName: Publish ZAP Baseline Report
      condition: always()
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/zap-baseline'
        artifactName: 'ZAP-Baseline-Report'

    - task: PublishHtmlReport@1
      displayName: Show ZAP Baseline Tab
      condition: always()
      inputs:
        reportDir: '$(System.DefaultWorkingDirectory)/zap-baseline'
        tabName: 'ZAP Baseline'

    - task: CmdLine@2
      displayName: Push ZAP Baseline results to DefectDojo
      condition: always()
      inputs:
        script: |
          HTTP_CODE=$(curl -sS -o /tmp/dd_zap_baseline_response.json -w "%{http_code}" -X POST "$DEFECTDOJO_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DEFECTDOJO_API_KEY" \
            -F "scan_type=ZAP Scan" \
            -F "file=@$(System.DefaultWorkingDirectory)/zap-baseline/zap-baseline.xml" \
            -F "product_type_name=SilkRoad ERP" \
            -F "product_name=SilkRoad ERP" \
            -F "engagement_name=SilkRoad DAST" \
            -F "test_title=ZAP Baseline Scan" \
            -F "auto_create_context=True" \
            -F "close_old_findings=true" \
            -F "minimum_severity=Low")
          echo "DefectDojo response (HTTP $HTTP_CODE):"
          cat /tmp/dd_zap_baseline_response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "##vso[task.logissue type=error]DefectDojo import (ZAP Baseline) failed with HTTP $HTTP_CODE"
            exit 1
          fi
      env:
        DEFECTDOJO_URL: $(defectDojoUrl)
        DEFECTDOJO_API_KEY: $(defectDojoApiKey)


# ============================================================
# 3️⃣  ZAP AJAX (re-added)
# ============================================================
- stage: ZAP_AJAX
  displayName: DAST - ZAP AJAX Spider Scan
  dependsOn:
  - ZAP_Baseline
  condition: succeeded()
  pool:
    vmImage: 'ubuntu-latest'
  jobs:
  - job: ZAPAjaxJob
    displayName: ZAP AJAX Spider (Blazor routes)
    steps:

    - task: CmdLine@2
      displayName: Prepare ZAP AJAX directory
      inputs:
        script: |
          mkdir -p $(System.DefaultWorkingDirectory)/zap-ajax
          chmod 777 $(System.DefaultWorkingDirectory)/zap-ajax

    - task: CmdLine@2
      displayName: Pull ZAP image
      inputs:
        script: |
          docker pull ghcr.io/zaproxy/zaproxy:stable

    - task: CmdLine@2
      displayName: Generate AJAX plan YAML
      inputs:
        script: |
          cat > $(System.DefaultWorkingDirectory)/zap-ajax/ajax-plan.yaml << 'EOF'
          env:
            contexts:
              - name: silkroad-erp
                urls:
                  - $(zapTarget)/
                excludePaths: []

          parameters:
            failOnError: false
            progressToStdout: true

          jobs:
            - type: spiderAjax
              parameters:
                url: $(zapTarget)/
                maxDuration: 5
                maxCrawlDepth: 10
                numberOfBrowsers: 2
                browserId: firefox-headless
                clickDefaultElems: true
                clickElemsOnce: true
                randomInputs: true

            - type: passiveScan-wait
              parameters:
                maxDuration: 5

            - type: outputSummary
              parameters:
                format: Long
                summaryFile: /zap/wrk/zap_out.json

            - type: report
              parameters:
                reportTitle: ZAP AJAX Spider - SilkRoad ERP
                reportDir: /zap/wrk/
                reportFile: zap-ajax.html
                template: traditional-html

            - type: report
              parameters:
                reportTitle: ZAP AJAX Spider - SilkRoad ERP
                reportDir: /zap/wrk/
                reportFile: zap-ajax.json
                template: traditional-json

            - type: report
              parameters:
                reportTitle: ZAP AJAX Spider - SilkRoad ERP
                reportDir: /zap/wrk/
                reportFile: zap-ajax.xml
                template: traditional-xml
          EOF

    - task: CmdLine@2
      displayName: Run ZAP AJAX Spider scan
      inputs:
        script: |
          docker run --rm \
            -v $(System.DefaultWorkingDirectory)/zap-ajax:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/ajax-plan.yaml

    - task: CmdLine@2
      displayName: Fix ZAP report permissions
      condition: always()
      inputs:
        script: |
          sudo chown -R $(id -u):$(id -g) $(System.DefaultWorkingDirectory)/zap-ajax
          sudo chmod -R 755 $(System.DefaultWorkingDirectory)/zap-ajax

    - task: PublishBuildArtifacts@1
      displayName: Publish ZAP AJAX Report
      condition: always()
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/zap-ajax'
        artifactName: 'ZAP-AJAX-Report'

    - task: PublishHtmlReport@1
      displayName: Show ZAP AJAX Tab
      condition: always()
      inputs:
        reportDir: '$(System.DefaultWorkingDirectory)/zap-ajax'
        tabName: 'ZAP AJAX Spider'

    - task: CmdLine@2
      displayName: Push ZAP AJAX results to DefectDojo
      condition: always()
      inputs:
        script: |
          HTTP_CODE=$(curl -sS -o /tmp/dd_zap_ajax_response.json -w "%{http_code}" -X POST "$DEFECTDOJO_URL/api/v2/reimport-scan/" \
            -H "Authorization: Token $DEFECTDOJO_API_KEY" \
            -F "scan_type=ZAP Scan" \
            -F "file=@$(System.DefaultWorkingDirectory)/zap-ajax/zap-ajax.xml" \
            -F "product_type_name=SilkRoad ERP" \
            -F "product_name=SilkRoad ERP" \
            -F "engagement_name=SilkRoad DAST" \
            -F "test_title=ZAP AJAX Spider Scan" \
            -F "auto_create_context=True" \
            -F "close_old_findings=true" \
            -F "minimum_severity=Low")
          echo "DefectDojo response (HTTP $HTTP_CODE):"
          cat /tmp/dd_zap_ajax_response.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "##vso[task.logissue type=error]DefectDojo import (ZAP AJAX) failed with HTTP $HTTP_CODE"
            exit 1
          fi
      env:
        DEFECTDOJO_URL: $(defectDojoUrl)
        DEFECTDOJO_API_KEY: $(defectDojoApiKey)


# ============================================================
# 4️⃣  ENSURE WORKER VM EXISTS (IaC)
# ============================================================
- stage: EnsureWorker
  displayName: Ensure Worker VM exists
  dependsOn:
  - ZAP_AJAX
  condition: succeeded()
  pool:
    name: OnPremAgents
  jobs:
  - job: TerraformApply
    steps:
    - task: AzureCLI@2
      displayName: Terraform Init & Apply (worker-vm)
      inputs:
        azureSubscription: 'TunNetCom_Azure_Connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e

          cd deployments/terraform/worker-vm

          # Write the SSH key from the pipeline secret into a .tfvars file
          cat > terraform.tfvars <<- EOF
          resource_group_name     = "Aion_VM_group"
          location                = "francecentral"
          vm_name                 = "AionWorkerNode"
          vm_size                 = "Standard_B2s"
          admin_username          = "workerMalek"
          ssh_public_key          = "$(AZURE_WORKER_SSH_KEY)"
          allowed_ssh_source_cidr = "*"
          assign_public_ip        = true
          vnet_name               = "AionWorkerNode-vnet"
          vnet_address_space      = "10.0.0.0/16"
          subnet_name             = "default"
          subnet_address_prefix   = "10.0.0.0/24"
          nsg_name                = "AionWorkerNode-nsg"
          nic_name                = "aionworkernode1"
          shutdown_time           = "1900"
          shutdown_timezone       = "Central European Standard Time"
          EOF

          terraform init
          terraform apply -auto-approve

# ============================================================
# 5️⃣  DEPLOY TO DEV (kept from the stable pipeline)
# ============================================================
- stage: Deploy
  displayName: Blue/Green Deploy to Dev
  dependsOn:
  - EnsureWorker
  condition: succeeded()
  pool:
    name: OnPremAgents
  jobs:
  - deployment: BlueGreenDeploy          # ← deployment job, not job
    displayName: Deploy to Dev
    environment: silkroad-dev            # ← links to the environment
    strategy:
      runOnce:
        deploy:
          steps:

          - task: CmdLine@2
            displayName: Detect Active Environment
            inputs:
              script: |
                CURRENT=$(kubectl get svc $(apiService) -n $(kubeNamespace) \
                  -o jsonpath='{.spec.selector.version}')
                echo "Current active version: $CURRENT"
                if [ "$CURRENT" = "blue" ]; then
                  echo "##vso[task.setvariable variable=targetColor]green"
                  echo "##vso[task.setvariable variable=otherColor]blue"
                else
                  echo "##vso[task.setvariable variable=targetColor]blue"
                  echo "##vso[task.setvariable variable=otherColor]green"
                fi

          - task: CmdLine@2
            displayName: Validate Image Tags
            inputs:
              script: |
                if [[ -z "$(apiTag)" || "$(apiTag)" == *"PLACEHOLDER"* ]]; then
                  echo "❌ Invalid apiTag: $(apiTag)"
                  exit 1
                fi
                if [[ -z "$(webappTag)" || "$(webappTag)" == *"PLACEHOLDER"* ]]; then
                  echo "❌ Invalid webappTag: $(webappTag)"
                  exit 1
                fi
                echo "✅ Image tags are valid"

          - task: CmdLine@2
            displayName: Deploy Target
            inputs:
              script: |
                kubectl apply -f deployments/k8s/api-service.yaml
                kubectl apply -f deployments/k8s/webapp-service.yaml
                kubectl apply -f deployments/k8s/api-$(targetColor).yaml
                kubectl apply -f deployments/k8s/webapp-$(targetColor).yaml
                kubectl set image deployment/silkroad-api-$(targetColor) \
                  api=$(dockerRepository):$(apiTag) \
                  -n $(kubeNamespace)
                kubectl set image deployment/silkroad-webapp-$(targetColor) \
                  webapp=$(dockerRepository):$(webappTag) \
                  -n $(kubeNamespace)

          - task: CmdLine@2
            displayName: Wait for Rollout
            inputs:
              script: |
                kubectl rollout status deployment/silkroad-api-$(targetColor) \
                  -n $(kubeNamespace) --timeout=180s
                kubectl rollout status deployment/silkroad-webapp-$(targetColor) \
                  -n $(kubeNamespace) --timeout=180s

          - task: CmdLine@2
            displayName: Verify Target Health
            inputs:
              script: |
                READY=$(kubectl get pods -n $(kubeNamespace) \
                  -l version=$(targetColor) \
                  --no-headers \
                  -o custom-columns='READY:.status.containerStatuses[0].ready,PHASE:.status.phase' \
                  | grep "true.*Running" | wc -l)
                if [ "$READY" -eq 0 ]; then
                  echo "❌ No healthy pods. Aborting."
                  kubectl describe pods -n $(kubeNamespace) -l version=$(targetColor)
                  exit 1
                fi
                echo "✅ $READY healthy pod(s) found"

          - task: CmdLine@2
            displayName: Switch Traffic
            inputs:
              script: |
                kubectl patch svc $(apiService) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-api\",\"environment\":\"production\",\"version\":\"$(targetColor)\"}}}"
                kubectl patch svc $(webService) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-webapp\",\"environment\":\"production\",\"version\":\"$(targetColor)\"}}}"

          - task: CmdLine@2
            displayName: Fix Dapr Annotations
            inputs:
              script: |
                kubectl patch deployment silkroad-api-$(targetColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"true\"}}}}}"
                kubectl patch deployment silkroad-webapp-$(targetColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"true\"}}}}}"
                kubectl patch deployment silkroad-api-$(otherColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"false\"}}}}}"
                kubectl patch deployment silkroad-webapp-$(otherColor) -n $(kubeNamespace) \
                  -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dapr.io/enabled\":\"false\"}}}}}"

          - task: CmdLine@2
            displayName: Verify Traffic Switch
            inputs:
              script: |
                kubectl get svc $(apiService) -n $(kubeNamespace) -o wide
                kubectl get pods -n $(kubeNamespace) -l version=$(targetColor)