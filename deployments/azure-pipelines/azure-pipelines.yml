# ============================================================
# SilkRoad CI/CD Pipeline - BLUE/GREEN + SECURITY + SONARQUBE
# ============================================================
#
# FIXES APPLIED (2026-05-25):
#   1. Moved Pre-pull SQL Server image to just before tests
#      → docker system prune was wiping the image before tests ran
#   2. Moved Pre-Docker Disk Cleanup to AFTER SonarQube Publish
#      → prune was deleting the SQL Server image needed by Testcontainers
#   3. Removed duplicate DataCollectionRunSettings inline override
#      → conflicted with test.runsettings; coverage now controlled
#        entirely by test.runsettings (opencover format)
#   4. Added --logger console;verbosity=detailed to test step
#      → surfaces actual failure messages in the pipeline log
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod
- name: dockerRepository
  value: 'tunnetcom/silkroad'
- name: apiTag
  value: 'api-$(Build.BuildId)'
- name: webappTag
  value: 'webapp-$(Build.BuildId)'
- name: kubeNamespace
  value: 'silkroad-dev'
- name: apiService
  value: 'silkroad-api-service'
- name: webService
  value: 'silkroad-webapp-service'
- name: zapTarget
  value: 'https://silkroad.aion-time.com'

stages:

# ============================================================
# 1️⃣  BUILD
# ============================================================
- stage: Build
  displayName: Build, SonarQube, Scan & Push
  jobs:
  - job: BuildPush
    steps:

    # ---------------- DOCKER LOGIN ----------------
    - task: Docker@2
      displayName: Docker Login
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    # ---------------- SDK 8 first (SonarQube scanner requirement) ----------------
    # SonarQube's .NET scanner requires SDK 8 to be present in the tool cache.
    # Installing it first ensures it is found; SDK 10 is installed second so
    # it becomes the active default for build/test steps.
    - task: UseDotNet@2
      displayName: Install .NET SDK 8 (SonarQube scanner requirement)
      inputs:
        packageType: sdk
        version: '8.x'

    # ---------------- SDK 10 last → becomes the active default ----------------
    - task: UseDotNet@2
      displayName: Install .NET SDK 10 (active default)
      inputs:
        packageType: sdk
        version: '10.x'

    # ---------------- RESTORE ----------------
    - task: DotNetCoreCLI@2
      displayName: Restore NuGet packages
      inputs:
        command: restore
        projects: '**/*.sln'

    # ============================================================
    # 🔷 SONARQUBE PREPARE (must be before build)
    # Scanner finds SDK 8 in the tool cache; build/test use SDK 10
    # ============================================================
    - task: SonarQubePrepare@7
      displayName: SonarQube Prepare
      inputs:
        SonarQube: 'SonarConnection'
        scannerMode: 'dotnet'
        projectKey: 'Silk_Road_ERP_Silk_Road_ERP_5cfe75f5-a231-4074-9e4c-4f5ccd21b96e'
        projectName: 'SilkRoad ERP'
        extraProperties: |
          sonar.host.url=https://sonarqube.aion-time.com
          sonar.exclusions=**/bin/**,**/obj/**,**/*.json,**/*.html
          sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/**/coverage.opencover.xml
          sonar.cpd.exclusions=**/*.json,**/*.html

    # ---------------- BUILD (runs under SDK 10) ----------------
    - task: DotNetCoreCLI@2
      displayName: Build solution
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration Release --no-restore'

    # ============================================================
    # FIX #1 — Pre-pull SQL Server image immediately before tests
    # Previously this step was placed before SonarQube Prepare,
    # meaning the subsequent disk cleanup wiped the image before
    # Testcontainers could use it.
    # ============================================================
    - task: CmdLine@2
      displayName: Pre-pull SQL Server image for Testcontainers
      inputs:
        script: |
          docker pull mcr.microsoft.com/mssql/server:2022-latest

    # ============================================================
    # 🧪 RUN TESTS WITH COVERAGE
    #
    # FIX #2 — Removed duplicate DataCollectionRunSettings override
    #   The inline "-- DataCollectionRunSettings..." argument
    #   conflicted with test.runsettings which already sets opencover.
    #   Coverage format is now controlled solely by test.runsettings.
    #
    # FIX #3 — Added --logger console;verbosity=detailed
    #   Surfaces actual test failure messages directly in the log
    #   so you don't have to navigate to the Tests tab to diagnose.
    #
    # continueOnError: true — a test failure must not block
    #   SonarQube from publishing its quality gate result.
    # ============================================================
# AFTER
    - task: DotNetCoreCLI@2
      displayName: Run tests with coverage
      continueOnError: true
      inputs:
        command: test
        projects: '**/*[Tt]est*/*.csproj'
        publishTestResults: false
        arguments: >-
          --logger trx
          --results-directory $(Agent.TempDirectory)
          --configuration Release
          --collect "XPlat Code Coverage"
          --settings test.runsettings
          --logger "console;verbosity=detailed"
      env:
        TESTCONTAINERS_RYUK_DISABLED: "true"

    - task: PublishTestResults@2
      displayName: Publish test results
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '$(Agent.TempDirectory)/**/*.trx'

    # ============================================================
    # 🔷 SONARQUBE ANALYSIS + QUALITY GATE
    # # ============================================================
    - task: SonarQubeAnalyze@7
      displayName: SonarQube Analyze

    - task: SonarQubePublish@7
      displayName: SonarQube Publish Quality Gate
      inputs:
        pollingTimeoutSec: '300'

    # ============================================================
    # FIX #4 — Disk cleanup moved to AFTER SonarQube Publish
    #
    # Previously this ran before tests, which caused docker system
    # prune to delete the pre-pulled SQL Server image that
    # Testcontainers needed. Now it runs after all analysis is
    # complete, safely clearing space before Docker image builds.
    # ============================================================
    - task: CmdLine@2
      displayName: Pre-Docker Disk Cleanup
      inputs:
        script: |
          echo "=== Disk usage before cleanup ==="
          df -h

          echo "Freeing disk space before Docker builds..."

          # Remove .NET build output (already analysed by Sonar)
          find . -type d -name 'bin' -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name 'obj' -exec rm -rf {} + 2>/dev/null || true

          # Remove SonarQube scanner cache
          rm -rf ~/.sonar/cache 2>/dev/null || true

          # Remove leftover .NET package cache
          dotnet nuget locals all --clear 2>/dev/null || true

          # Remove stopped containers, dangling images, unused networks/volumes
          docker system prune -af || true
          docker builder prune -af || true

          echo "=== Disk usage after cleanup ==="
          df -h

    # ============================================================
    # 🔒 INSTALL TRIVY
    # ============================================================
    # - task: CmdLine@2
    #   displayName: Install Trivy
    #   inputs:
    #     script: |
    #       sudo apt-get update -qq
    #       sudo apt-get install -y wget apt-transport-https gnupg lsb-release
    #       wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
    #       echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
    #         | sudo tee /etc/apt/sources.list.d/trivy.list
    #       sudo apt-get update -qq
    #       sudo apt-get install -y trivy

    # ============================================================
    # 🔵 API: BUILD → SCAN → PUSH → CLEANUP
    # ============================================================
    - task: CmdLine@2
      displayName: Build API image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(apiTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile .

    # - task: CmdLine@2
    #   displayName: Scan API image (Trivy)
    #   inputs:
    #     script: |
    #       export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-api
    #       mkdir -p $TRIVY_CACHE_DIR

    #       echo "Scanning API image..."
    #       trivy image \
    #         --scanners vuln \
    #         --cache-dir $TRIVY_CACHE_DIR \
    #         --no-progress \
    #         --timeout 10m \
    #         --exit-code 1 \
    #         --severity HIGH,CRITICAL \
    #         $(dockerRepository):$(apiTag)

    - task: CmdLine@2
      displayName: Push API image
      inputs:
        script: |
          docker push $(dockerRepository):$(apiTag)

    - task: CmdLine@2
      displayName: Cleanup after API build
      inputs:
        script: |
          echo "Cleaning AFTER API..."
          docker system prune -af || true
          docker builder prune -af || true
          df -h

    # ============================================================
    # 🟢 WEB: BUILD → SCAN → PUSH → CLEANUP
    # ============================================================
    - task: CmdLine@2
      displayName: Build Web image
      inputs:
        script: |
          docker build --no-cache \
            -t $(dockerRepository):$(webappTag) \
            -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile .

    # - task: CmdLine@2
    #   displayName: Scan Web image (Trivy)
    #   inputs:
    #     script: |
    #       export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-web
    #       mkdir -p $TRIVY_CACHE_DIR

    #       echo "Scanning Web image..."
    #       trivy image \
    #         --scanners vuln \
    #         --cache-dir $TRIVY_CACHE_DIR \
    #         --no-progress \
    #         --timeout 10m \
    #         --exit-code 1 \
    #         --severity HIGH,CRITICAL \
    #         $(dockerRepository):$(webappTag)

    - task: CmdLine@2
      displayName: Push Web image
      inputs:
        script: |
          docker push $(dockerRepository):$(webappTag)

    - task: CmdLine@2
      displayName: Cleanup after Web build
      inputs:
        script: |
          echo "Cleaning AFTER Web..."
          docker system prune -af || true
          docker builder prune -af || true
          df -h


