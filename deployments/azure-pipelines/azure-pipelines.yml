# ============================================================
# SilkRoad CI/CD Pipeline - BLUE/GREEN + SECURITY + SONARQUBE
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod

- name: dockerRepository
  value: 'tunnetcom/silkroad'

- name: apiTag
  value: 'api-$(Build.BuildId)'

- name: webappTag
  value: 'webapp-$(Build.BuildId)'

- name: kubeNamespace
  value: 'silkroad-dev'

- name: apiService
  value: 'silkroad-api-service'

- name: webService
  value: 'silkroad-webapp-service'

- name: zapTarget
  value: 'https://silkroad.aion-time.com'

# ============================================================
# 1️⃣ BUILD + SONARQUBE + SCAN + PUSH
# ============================================================
stages:
- stage: Build
  displayName: Build, SonarQube, Scan & Push

  jobs:
  - job: BuildPush
    steps:

    # ---------------- LOGIN ----------------
    - task: Docker@2
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    # ---------------- .NET ----------------
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.x'

    - task: DotNetCoreCLI@2
      inputs:
        command: restore
        projects: '**/*.sln'

    # ============================================================
    # 🔷 SONARQUBE PREPARE (MUST BE BEFORE BUILD)
    # ============================================================
    - task: SonarQubePrepare@7
      inputs:
        SonarQube: 'SonarConnection'   
        scannerMode: 'dotnet'
        projectKey: 'Silk_Road_ERP_Silk_Road_ERP_f493c9cb-0b66-4d3f-8bfe-e8056216b526'
        projectName: 'SilkRoad ERP'
        extraProperties: |
          sonar.exclusions=**/bin/**,**/obj/**

    # ---------------- BUILD ----------------
    - task: DotNetCoreCLI@2
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration Release --no-restore'

    # ============================================================
    # 🔷 SONARQUBE ANALYSIS
    # ============================================================
    - task: SonarQubeAnalyze@7

    # ============================================================
    # 🔷 SONARQUBE QUALITY GATE
    # ============================================================
    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'

    # ---------------- INSTALL TRIVY ----------------
    - script: |
        sudo apt-get update -qq
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y trivy
      displayName: Install Trivy

    # ============================================================
    # 🔵 API BUILD + SCAN + PUSH
    # ============================================================

    - script: |
        docker build --no-cache \
          -t $(dockerRepository):$(apiTag) \
          -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile .
      displayName: Build API

    - script: |
        export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-api
        mkdir -p $TRIVY_CACHE_DIR

        trivy image \
          --scanners vuln \
          --cache-dir $TRIVY_CACHE_DIR \
          --no-progress \
          --timeout 10m \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(apiTag)
      displayName: Scan API

    - script: |
        docker push $(dockerRepository):$(apiTag)
      displayName: Push API

    - script: |
        docker system prune -af || true
        docker builder prune -af || true
      displayName: Cleanup API

    # ============================================================
    # 🟢 WEB BUILD + SCAN + PUSH
    # ============================================================

    - script: |
        docker build --no-cache \
          -t $(dockerRepository):$(webappTag) \
          -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile .
      displayName: Build Web

    - script: |
        export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-web
        mkdir -p $TRIVY_CACHE_DIR

        trivy image \
          --scanners vuln \
          --cache-dir $TRIVY_CACHE_DIR \
          --no-progress \
          --timeout 10m \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(webappTag)
      displayName: Scan Web

    - script: |
        docker push $(dockerRepository):$(webappTag)
      displayName: Push Web

# ============================================================
# 2️⃣ ZAP BASELINE
# ============================================================
- stage: ZAP_Baseline
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: ZAPBaselineJob
    steps:

    - script: |
        mkdir -p $(System.DefaultWorkingDirectory)/zap-baseline
      displayName: Prepare

    - script: |
        docker run --rm \
          -v $(System.DefaultWorkingDirectory)/zap-baseline:/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py -t $(zapTarget) -r report.html -J report.json -l WARN -I
      displayName: Run ZAP Baseline

# ============================================================
# 3️⃣ ZAP AJAX
# ============================================================
- stage: ZAP_AJAX
  dependsOn: ZAP_Baseline
  condition: succeeded()

  jobs:
  - job: ZAPAjaxJob
    steps:

    - script: |
        mkdir -p $(System.DefaultWorkingDirectory)/zap-ajax
      displayName: Prepare

    - script: |
        docker run --rm \
          -v $(System.DefaultWorkingDirectory)/zap-ajax:/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap.sh -cmd -quickurl $(zapTarget)
      displayName: Run ZAP AJAX

# ============================================================
# 4️⃣ BLUE / GREEN DEPLOYMENT
# ============================================================
- stage: Deploy
  dependsOn: ZAP_AJAX
  condition: succeeded()

  pool:
    name: OnPremAgents

  jobs:
  - job: Deploy
    steps:

    - script: |
        CURRENT=$(kubectl get svc $(apiService) -n $(kubeNamespace) \
          -o jsonpath='{.spec.selector.version}')

        if [ "$CURRENT" = "blue" ]; then
          echo "##vso[task.setvariable variable=targetColor]green"
        else
          echo "##vso[task.setvariable variable=targetColor]blue"
        fi
      displayName: Detect Active Env

    - script: |
        kubectl apply -f deployments/k8s/api-$(targetColor).yaml
        kubectl apply -f deployments/k8s/webapp-$(targetColor).yaml

        kubectl set image deployment/silkroad-api-$(targetColor) \
          api=$(dockerRepository):$(apiTag) -n $(kubeNamespace)

        kubectl set image deployment/silkroad-webapp-$(targetColor) \
          webapp=$(dockerRepository):$(webappTag) -n $(kubeNamespace)
      displayName: Deploy

    - script: |
        kubectl rollout status deployment/silkroad-api-$(targetColor) \
          -n $(kubeNamespace) --timeout=180s
      displayName: Rollout Check

    - script: |
        kubectl patch svc $(apiService) -n $(kubeNamespace) \
          -p "{\"spec\":{\"selector\":{\"version\":\"$(targetColor)\"}}}"
      displayName: Switch Traffic