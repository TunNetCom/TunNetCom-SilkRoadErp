# ============================================================
# SilkRoad CI/CD Pipeline - BLUE/GREEN + SECURITY (FIXED)
# ============================================================

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: silkroad-prod

- name: dockerRepository
  value: 'tunnetcom/silkroad'

- name: apiTag
  value: 'api-$(Build.BuildId)'

- name: webappTag
  value: 'webapp-$(Build.BuildId)'

- name: kubeNamespace
  value: 'silkroad-dev'

- name: apiService
  value: 'silkroad-api-service'

- name: webService
  value: 'silkroad-webapp-service'

- name: zapTarget
  value: 'https://silkroad.aion-time.com'

# ============================================================
# 1️⃣ BUILD + SCAN + PUSH
# ============================================================
stages:
- stage: Build
  displayName: Build, Scan & Push

  jobs:
  - job: BuildPush
    steps:

    # ---------------- LOGIN ----------------
    - task: Docker@2
      inputs:
        command: login
        containerRegistry: 'TunNetCom_Dockerhub_Connection'

    # ---------------- .NET ----------------
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '10.x'

    - task: DotNetCoreCLI@2
      inputs:
        command: restore
        projects: '**/*.sln'

    - task: DotNetCoreCLI@2
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration Release --no-restore'

    # ---------------- INSTALL TRIVY ----------------
    - script: |
        sudo apt-get update -qq
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y trivy
      displayName: Install Trivy

    # ============================================================
    # 🔵 API
    # ============================================================

    - script: |
        docker build --no-cache \
          -t $(dockerRepository):$(apiTag) \
          -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.Api/Dockerfile .
      displayName: Build API

    - script: |
        echo "Cleaning disk before scan..."
        docker system prune -af || true
        docker builder prune -af || true

        export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-api
        mkdir -p $TRIVY_CACHE_DIR

        trivy image \
          --scanners vuln \
          --cache-dir $TRIVY_CACHE_DIR \
          --no-progress \
          --timeout 10m \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(apiTag)
      displayName: Scan API

    - script: |
        docker push $(dockerRepository):$(apiTag)
      displayName: Push API

    # ============================================================
    # 🟢 WEB
    # ============================================================

    - script: |
        docker build --no-cache \
          -t $(dockerRepository):$(webappTag) \
          -f src/Modules/Sales/TunNetCom.SilkRoadErp.Sales.WebApp/Dockerfile .
      displayName: Build Web

    - script: |
        echo "Cleaning disk before scan..."
        docker system prune -af || true
        docker builder prune -af || true

        export TRIVY_CACHE_DIR=$(Pipeline.Workspace)/trivy-web
        mkdir -p $TRIVY_CACHE_DIR

        trivy image \
          --scanners vuln \
          --cache-dir $TRIVY_CACHE_DIR \
          --no-progress \
          --timeout 10m \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          $(dockerRepository):$(webappTag)
      displayName: Scan Web

    - script: |
        docker push $(dockerRepository):$(webappTag)
      displayName: Push Web

# ============================================================
# 2️⃣ SECURITY - OWASP ZAP
# ============================================================
- stage: Security
  displayName: OWASP ZAP Scan
  dependsOn: Build

  jobs:
  - job: ZAP
    steps:
    - script: |
        docker run --rm ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py -t $(zapTarget) -r report.html
      displayName: Run ZAP Baseline

# ============================================================
# 3️⃣ BLUE / GREEN DEPLOYMENT
# ============================================================
- stage: Deploy
  displayName: Blue/Green Deploy
  dependsOn: Security

  pool:
    name: OnPremAgents

  jobs:
  - job: BlueGreenDeploy
    steps:

    # ---------------- DETECT CURRENT ----------------
    - script: |
        echo "Detecting current environment..."
        CURRENT=$(kubectl get svc $(apiService) -n $(kubeNamespace) -o jsonpath='{.spec.selector.version}')
        echo "Current: $CURRENT"

        if [ "$CURRENT" = "blue" ]; then
          echo "##vso[task.setvariable variable=targetColor]green"
        else
          echo "##vso[task.setvariable variable=targetColor]blue"
        fi
      displayName: Detect Active Environment

    # ---------------- DEPLOY TARGET ----------------
    - script: |
        echo "Deploying $(targetColor)..."

        kubectl apply -f deployments/k8s/api-$(targetColor).yaml
        kubectl apply -f deployments/k8s/webapp-$(targetColor).yaml

        kubectl set image deployment/silkroad-api-$(targetColor) \
          api=$(dockerRepository):$(apiTag) -n $(kubeNamespace)

        kubectl set image deployment/silkroad-webapp-$(targetColor) \
          web=$(dockerRepository):$(webappTag) -n $(kubeNamespace)
      displayName: Deploy Target

    # ---------------- WAIT ----------------
    - script: |
        kubectl rollout status deployment/silkroad-api-$(targetColor) -n $(kubeNamespace)
        kubectl rollout status deployment/silkroad-webapp-$(targetColor) -n $(kubeNamespace)
      displayName: Wait Rollout

    # ---------------- HEALTH CHECK ----------------
    - script: |
        echo "Health check..."
        sleep 15
        curl -f $(zapTarget)/health || exit 1
      displayName: Health Check

    # ---------------- SWITCH TRAFFIC ----------------
    - script: |
        echo "Switching traffic to $(targetColor)..."

        kubectl patch svc $(apiService) -n $(kubeNamespace) \
          -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-api\",\"version\":\"$(targetColor)\"}}}"

        kubectl patch svc $(webService) -n $(kubeNamespace) \
          -p "{\"spec\":{\"selector\":{\"app\":\"silkroad-webapp\",\"version\":\"$(targetColor)\"}}}"
      displayName: Switch Traffic

    # ---------------- VERIFY ----------------
    - script: |
        kubectl get svc $(apiService) -n $(kubeNamespace) -o wide
      displayName: Verify Switch