# ==============================================================================
# Production Deployment - Single Pod Per Service (Low Traffic) - Nizar
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silkroad-api-nizar
  namespace: silkroad-prod-nizar
  labels:
    app: silkroad-api-nizar
    environment: production
    tier: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: silkroad-api-nizar
      environment: production
  template:
    metadata:
      labels:
        app: silkroad-api-nizar
        environment: production
        tier: backend
    spec:
      # ✅ Pod-level security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: api
        image: tunnetcom/silkroad:latest-api
        imagePullPolicy: Always

        # ✅ Container-level security
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        ports:
        - containerPort: 8080
        - containerPort: 8081

        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: silkroad-connection-secret
              key: ConnectionStrings__DefaultConnection
        - name: EF_MIGRATE_ON_STARTUP
          value: "false"

        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"