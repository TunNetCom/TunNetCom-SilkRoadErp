apiVersion: apps/v1
kind: Deployment
metadata:
  name: silkroad-api-green
  namespace: silkroad-dev
  labels:
    app: silkroad-api
    version: green
    environment: production
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silkroad-api
      version: green
      environment: production
  template:
    metadata:
      labels:
        app: silkroad-api
        version: green
        environment: production
        tier: backend
      annotations:
        deployment.kubernetes.io/revision: "1"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: tunnetcom/silkroad:API_TAG_PLACEHOLDER
        imagePullPolicy: Always
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: https
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: silkroad-connection-secret
              key: ConnectionStrings__DefaultConnection
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
