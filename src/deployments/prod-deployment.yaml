# ==============================================================================
# Production Deployment - Single Pod Per Service (Low Traffic)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silkroad-api
  namespace: silkroad-dev
  labels:
    app: silkroad-api
    environment: production
    tier: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: silkroad-api
      environment: production
  template:
    metadata:
      labels:
        app: silkroad-api
        environment: production
        tier: backend
      annotations:
        deployment.kubernetes.io/revision: "1"
    spec:
      # FIX KSV-0118: pod-level security context — no root, proper fs ownership
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: tunnetcom/silkroad:API_TAG_PLACEHOLDER
        imagePullPolicy: Always
        # FIX KSV-0014 + KSV-0118: container-level security context
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: https
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: silkroad-connection-secret
              key: ConnectionStrings__DefaultConnection
        - name: EF_MIGRATE_ON_STARTUP
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silkroad-webapp
  namespace: silkroad-dev
  labels:
    app: silkroad-webapp
    environment: production
    tier: frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: silkroad-webapp
      environment: production
  template:
    metadata:
      labels:
        app: silkroad-webapp
        environment: production
        tier: frontend
      annotations:
        deployment.kubernetes.io/revision: "1"
    spec:
      # FIX KSV-0118: pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        - name: dataprotection-keys
          emptyDir: {}
        # FIX: ASP.NET needs a writable temp dir when root FS is readonly
        - name: tmp
          emptyDir: {}
      containers:
      - name: webapp
        image: tunnetcom/silkroad:WEBAPP_TAG_PLACEHOLDER
        imagePullPolicy: Always
        # FIX KSV-0014 + KSV-0118: container-level security context
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        volumeMounts:
          - name: dataprotection-keys
            mountPath: /home/app/.aspnet/DataProtection-Keys
          # FIX: mount writable /tmp for ASP.NET runtime temp files
          - name: tmp
            mountPath: /tmp
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ApiSettings__BaseUrl
          value: "http://silkroad-api-service:8080"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 30